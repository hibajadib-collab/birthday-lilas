<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Lilas 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ffd6e0, #ffffff, #c9a0ff);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* Center */
.container {
    text-align: center;
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* Title */
h1 {
    color: #b57edc; /* violet */
    font-size: 45px;
    text-shadow: 0 0 8px #ffd700;
}

/* Gift */
.gift {
    font-size: 85px;
    cursor: pointer;
    animation: bounce 1.5s infinite;
    filter: drop-shadow(0 0 8px gold);
}

/* Letter */
.letter {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(145deg, #ffffff, #ffe6f0);
    padding: 30px;
    border-radius: 20px;
    width: 80%;
    max-width: 420px;
    color: #6a1b9a;
    box-shadow: 0 0 25px #c9a0ff;
    border: 2px solid #ffd700;
}

/* Hearts */
.heart {
    position: absolute;
    color: #ff99cc;
    font-size: 22px;
    animation: floatUp 6s linear infinite;
    text-shadow: 0 0 10px #c9a0ff;
}

/* Firework particles */
.firework {
    position: absolute;
    font-size: 20px;
    animation: explode 1.2s ease-out forwards;
}

/* Animations */
@keyframes explode {
    0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
    }
    100% {
        transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0.3);
        opacity: 0;
    }
}

@keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* Shake */
@keyframes shake {
    0% { transform: translate(0,0); }
    25% { transform: translate(10px, -10px); }
    50% { transform: translate(-10px, 10px); }
    75% { transform: translate(10px, 10px); }
    100% { transform: translate(0,0); }
}

.shake {
    animation: shake 0.5s;
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<div class="container">
    <h1>Happy Birthday Lilas 💖💜✨</h1>
    <div class="gift" onclick="openGift()">🎁</div>
    <p style="color:#b57edc;">Click your gift 🎀</p>
</div>

<div class="letter" id="letter">
    <h2>💌 For you Lilas</h2>
    <p>
    My beautiful cousin, my sister 🤍<br><br>
    I love you sooooooooo much 💖<br><br>
    I’m so proud of you 🦷✨  
    I know you will succeed with amazing grades 🎓💗<br><br>
    I hope we commit soon 🤍  
    And travel the world together 🌍✈️<br><br>
    Happy Birthday my love 🎂💖💜✨
    </p>
</div>

<script>
// BIG FIREWORK BOOM
function createBigBoom() {
    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;

    for (let i = 0; i < 140; i++) {
        let f = document.createElement("div");
        f.className = "firework";

        const symbols = ["💖","💜","✨","💛","🎆","⭐"];
        f.innerText = symbols[Math.floor(Math.random()*symbols.length)];

        let angle = Math.random() * 2 * Math.PI;
        let radius = Math.random() * 650;

        let x = Math.cos(angle) * radius + "px";
        let y = Math.sin(angle) * radius + "px";

        f.style.setProperty("--x", x);
        f.style.setProperty("--y", y);

        f.style.left = centerX + "px";
        f.style.top = centerY + "px";

        document.body.appendChild(f);

        setTimeout(() => f.remove(), 1200);
    }
}

// OPEN GIFT
function openGift() {
    createBigBoom();

    document.body.classList.add("shake");
    setTimeout(() => document.body.classList.remove("shake"), 500);

    let music = document.getElementById("music");
    music.volume = 0.5;
    music.play();

    setTimeout(() => {
        document.querySelector(".container").style.display = "none";
        document.getElementById("letter").style.display = "block";
    }, 800);
}

// Floating hearts
function createHeart() {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "💗";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.animationDuration = (4 + Math.random() * 3) + "s";

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 250);
</script>

</body>
</html>
